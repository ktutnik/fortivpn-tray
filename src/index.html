<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FortiVPN Settings</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="tabs" id="tabs"></div>
      <form id="profile-form" autocomplete="off">
        <div class="form-group">
          <label for="f-name">Name</label>
          <input type="text" id="f-name" required placeholder="e.g. MIMS SG" />
        </div>
        <div class="form-group">
          <label for="f-host">Host</label>
          <input type="text" id="f-host" required placeholder="vpn.example.com" />
        </div>
        <div class="form-group">
          <label for="f-port">Port</label>
          <input type="number" id="f-port" required value="10443" min="1" max="65535" />
        </div>
        <div class="form-group">
          <label for="f-username">Username</label>
          <input type="text" id="f-username" required placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label for="f-cert">Trusted Cert</label>
          <input type="text" id="f-cert" placeholder="(optional) SHA-256 hash" />
        </div>

        <div class="password-section" id="password-section">
          <button type="button" id="btn-change-pw" class="btn-link">
            <span id="pw-indicator"></span> Change Password
          </button>
          <div class="password-input" id="pw-input" style="display:none">
            <input type="password" id="f-password" placeholder="New password" />
            <button type="button" id="btn-set-pw" class="btn btn-small">Set</button>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-delete" class="btn btn-danger" style="display:none">Delete</button>
          <div class="spacer"></div>
          <button type="submit" id="btn-save" class="btn btn-primary">Save</button>
        </div>

        <div class="message" id="message"></div>
      </form>
    </div>
  </body>
</html>
