name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle
        run: bash scripts/bundle-app.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "FortiVPN Tray" \
            -srcfolder "target/release/bundle/FortiVPN Tray.app" \
            -ov -format UDZO \
            "fortivpn-tray-${{ matrix.target }}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fortivpn-tray-${{ matrix.target }}
          path: "*.dmg"
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          FEATS=""
          FIXES=""
          REFACTORS=""
          PERFS=""
          DOCS=""
          OTHERS=""

          while IFS= read -r line; do
            MSG="${line#* }"
            if echo "$MSG" | grep -qE '^feat(\(.*\))?!?:'; then
              FEATS="${FEATS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^fix(\(.*\))?!?:'; then
              FIXES="${FIXES}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^refactor(\(.*\))?!?:'; then
              REFACTORS="${REFACTORS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^perf(\(.*\))?!?:'; then
              PERFS="${PERFS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^docs(\(.*\))?!?:'; then
              DOCS="${DOCS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^(chore|ci|test)(\(.*\))?!?:'; then
              :
            else
              OTHERS="${OTHERS}\n- ${MSG}"
            fi
          done < <(git log "$RANGE" --oneline --no-merges)

          NOTES=""
          if [ -n "$FEATS" ]; then
            NOTES="${NOTES}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$PERFS" ]; then
            NOTES="${NOTES}## Performance\n${PERFS}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            NOTES="${NOTES}## Refactoring\n${REFACTORS}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            NOTES="${NOTES}## Documentation\n${DOCS}\n\n"
          fi
          if [ -n "$OTHERS" ]; then
            NOTES="${NOTES}## Other Changes\n${OTHERS}\n\n"
          fi

          echo -e "$NOTES" > /tmp/release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: /tmp/release-notes.md
          files: artifacts/**/*.dmg
