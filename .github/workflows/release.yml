name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortivpn-tray-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Categorize conventional commits
          FEATS=""
          FIXES=""
          REFACTORS=""
          PERFS=""
          DOCS=""
          OTHERS=""

          while IFS= read -r line; do
            MSG="${line#* }"
            if echo "$MSG" | grep -qE '^feat(\(.*\))?!?:'; then
              FEATS="${FEATS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^fix(\(.*\))?!?:'; then
              FIXES="${FIXES}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^refactor(\(.*\))?!?:'; then
              REFACTORS="${REFACTORS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^perf(\(.*\))?!?:'; then
              PERFS="${PERFS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^docs(\(.*\))?!?:'; then
              DOCS="${DOCS}\n- ${MSG#*: }"
            elif echo "$MSG" | grep -qE '^(chore|ci|test)(\(.*\))?!?:'; then
              : # skip chore/ci/test from release notes
            else
              OTHERS="${OTHERS}\n- ${MSG}"
            fi
          done < <(git log "$RANGE" --oneline --no-merges)

          # Build release notes
          NOTES=""
          if [ -n "$FEATS" ]; then
            NOTES="${NOTES}## Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$PERFS" ]; then
            NOTES="${NOTES}## Performance\n${PERFS}\n\n"
          fi
          if [ -n "$REFACTORS" ]; then
            NOTES="${NOTES}## Refactoring\n${REFACTORS}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            NOTES="${NOTES}## Documentation\n${DOCS}\n\n"
          fi
          if [ -n "$OTHERS" ]; then
            NOTES="${NOTES}## Other Changes\n${OTHERS}\n\n"
          fi

          echo -e "$NOTES" > /tmp/release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: artifacts/**/*.dmg
