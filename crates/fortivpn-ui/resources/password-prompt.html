<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Password</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #d1d1d6;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --accent: #007aff;
    --accent-hover: #0062cc;
    --input-bg: #ffffff;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --border: #3a3a3c;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --input-bg: #3a3a3c;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
  }
  input { user-select: text; -webkit-user-select: text; }
  h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .form-group {
    margin-bottom: 12px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .form-group input {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .checkbox-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
  }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .btn {
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--border); }
</style>
</head>
<body>
  <h3 id="title">Enter Password</h3>
  <div class="subtitle" id="subtitle">Connect to VPN profile</div>
  <div class="form-group">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your VPN password" autofocus>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="remember" checked>
    <label for="remember">Remember password in Keychain</label>
  </div>
  <div class="actions">
    <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
    <button class="btn btn-primary" id="btn-connect">Connect</button>
  </div>
<script>
  function doSubmit() {
    var pw = document.getElementById('password').value;
    if (!pw) return;
    var remember = document.getElementById('remember').checked;
    window.ipc.postMessage(JSON.stringify({action:"submit", password: pw, remember: remember}));
  }
  function doCancel() {
    window.ipc.postMessage(JSON.stringify({action:"cancel"}));
  }
  document.getElementById('btn-connect').addEventListener('click', doSubmit);
  document.getElementById('btn-cancel').addEventListener('click', doCancel);
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSubmit();
    if (e.key === 'Escape') doCancel();
  });

  // Called from Rust to set profile name
  function setProfileName(name) {
    document.getElementById('title').textContent = 'Enter Password';
    document.getElementById('subtitle').textContent = 'Connect to ' + name;
  }
</script>
</body>
</html>
